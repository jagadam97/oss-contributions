name: Sync PR Status

# ── Triggers ─────────────────────────────────────────────────────────────────
on:
  schedule:
    # Once a day at 08:00 UTC — only open/reviewed PRs are checked,
    # so 100+ PRs is fine even with the default GITHUB_TOKEN (5 000 req/hr).
    - cron: "0 8 * * *"

  # Manual trigger from the Actions tab
  workflow_dispatch:

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: read
  actions: write

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:
  sync:
    name: Sync open PR statuses → Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run sync script
        env:
          NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Automatically provided by GitHub — 5 000 authenticated req/hr
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run sync

      - name: Trigger site redeploy
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy.yml \
            --repo ${{ github.repository }} \
            --ref main
